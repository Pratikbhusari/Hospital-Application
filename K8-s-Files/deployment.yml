apiVersion: apps/v1
kind: Deployment

metadata:
  name: pratik-deployment
  labels:
    first: app

spec:
  replicas: 2

  selector:
    matchLabels:
      app: web

  template:
    metadata:
      labels:
        app: web

    spec:
      containers:
      - name: pratik-container
        image: pratikbhusari10/hospital:v1.0.0

        ports:
        - containerPort: 5000
